<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — The Bad Software Company</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/style.css">
<script src="/assets/theme.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><a href="/index.html" aria-label="The Bad Software Company home"><img class="logo-light" src="/assets/light-logo.png" alt="The Bad Software Company"><img class="logo-dark" src="/assets/dark-logo.png" alt="The Bad Software Company"></a></h1>
      <nav>
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a href="/services.html">Services</a>
        <a href="/blog/index.html">Blog</a>
        <a href="/contact.html">Contact Us</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="container">
    <h2>Contact</h2>
    <form id="contact-form" action="#" method="post">
      <p class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </p>

      <p class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </p>

      <p class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </p>

      <p><button type="submit" class="cta">Send message</button></p>
    </form>
    <p class="muted">Form is not hooked up yet.</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 The Bad Software Company</p>
    </div>
  </footer>
</body>
</html>
