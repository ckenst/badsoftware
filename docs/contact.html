<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — The Bad Software Company</title>
  <link rel="stylesheet" href="/assets/style.css">
<script src="/assets/theme.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">The Bad Software Company</h1>
      <nav>
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a href="/services.html">Services</a>
        <a href="/contact.html">Contact</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="container">
    <h2>Contact</h2>
    <form id="contact-form" action="#" method="post" novalidate>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <p><button type="submit" class="cta">Send message</button></p>
    </form>
    <p class="muted">Form is not hooked up yet.</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 and beyond The Bad Software Company</p>
    </div>
  </footer>
</body>
</html>
